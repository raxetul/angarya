---
- name: Setup auto rsync backup on USB disk plug via udev
  become: true
  block:
    - name: Create systemd override directory for systemd-udevd
      ansible.builtin.file:
        path: /etc/systemd/system/systemd-udevd.service.d
        state: directory
        mode: '0755'

    - name: Create systemd service for USB backup
      ansible.builtin.template:
        src: backup-server.service.j2
        dest: /etc/systemd/system/{{ backup.server_name }}-backup@.service
        mode: '0644'
        owner: root
        group: root
      notify: Reload systemd

    - name: Ensure /opt/scripts directory exists
      ansible.builtin.file:
        path: /opt/scripts
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Install postgresql-client for db backups
      ansible.builtin.apt:
        name: postgresql-client
        state: present
        update_cache: true
        cache_valid_time: 3600
      when: (postgresql | default({})) | length > 0

    - name: Ensure /etc/credstore exists
      ansible.builtin.file:
        path: /etc/credstore
        state: directory
        mode: '0700'
        owner: root
        group: root

    - name: Render pgpass credstore for DB backup
      ansible.builtin.template:
        src: pgpass.j2
        dest: /etc/credstore/pgpass-{{ backup.server_name }}
        mode: '0400'
        owner: root
        group: root
      no_log: true

    - name: Deploy backup orchestrator script
      ansible.builtin.template:
        src: backup-server.sh.j2
        dest: /opt/scripts/backup-server.sh
        mode: '0755'
        owner: root
        group: root

    - name: Deploy files backup script
      ansible.builtin.template:
        src: backup-files.sh.j2
        dest: /opt/scripts/backup-files.sh
        mode: '0755'
        owner: root
        group: root

    - name: Deploy db backup script
      ansible.builtin.template:
        src: backup-db.sh.j2
        dest: /opt/scripts/backup-db.sh
        mode: '0755'
        owner: root
        group: root

    - name: Create the udev rule
      ansible.builtin.template:
        src: usb-rsync-backup.rules.j2
        dest: /etc/udev/rules.d/99-{{ backup.server_name }}-usb-rsync-backup.rules
        mode: '0644'
        owner: root
        group: root
      notify: Reload udev rules
