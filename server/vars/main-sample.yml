# Copy this file and remove sample word from the name

backup:
  server_name: my-server
  webhook:
    completed:
      id: -_abcde12345abcde____abcd
    started:
      id: -12345abcde_____abcde1234
    has_error:
      id: -fedcba98765fedcba____fed
  external_drive:
    uuid: aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee
    serial: WDC_aaaaaaaa-*#*##**#_WD-************
  log_dir: "/media/backup/synched/log"
  target_mount: "/media/backup"
  tasks:
    photos:
      source: "/media/photos"
      target: "/media/backup/synched"
    immich_server:
      source: "/home/rootless/docker/immich/data/immich-server"
      target: "/media/backup/synched/docker/immich/data"
    nextcloud_data:
      source: "/home/rootless/docker/nextcloud/data"
      target: "/media/backup/synched/docker/nextcloud/data"
      excludes:
        - "**/backups/**"

# PostgreSQL servers/applications to back up. Each key is a server name and maps
# to its connection details. The DB backup runs pg_dump once per entry and writes
# <name>-<timestamp>.<ext> under "{{ backup.target_mount }}/postgres".
# Passwords for each key live in an ansible-vault file under the var name
# `postgresql_secrets` (keys MUST match). See my-secrets-sample.yml at repo root.
#
# Per-target fields:
#   format:    custom | plain | tar | directory        (default custom)
#   compress:  true -> gzip the dump to *.sql.gz        (plain format only)
#   extra_args: passed verbatim to pg_dump. NOTE: --clean/--if-exists are
#              plain-format only; for archive formats the restore performs clean.
#
# immich uses the VectorChord (vchord) extension. Its docs recommend a
# plain-format `pg_dump --clean --if-exists`, gzipped, and restoring into a
# matching immich version. Verify the exact procedure for your immich version.
postgresql:
  immich:
    host: 10.0.0.10
    port: 5432
    user: immich
    dbname: immich
    format: plain             # immich recommends plain-format pg_dump
    compress: true            # -> immich-<timestamp>.sql.gz
    extra_args:
      - "--clean"
      - "--if-exists"
  nextcloud:
    host: 10.0.0.11
    port: 5432
    user: nextcloud
    dbname: nextcloud
    format: custom

homeassistant_lxc:
  lxc_container_name: homeassistant
  lxc_storage_pool: default
  volume_size: 40GB
  dist: debian
  arch: amd64
  release: bookworm
  timezone: Europe/Istanbul
  enable_nfs: false
  enable_docker: true
  os_agent_version: "1.7.2"
  os_agent_arch: x86_64
  net:
    ip: "10.0.0.5"
    gateway: "10.0.0.1"
    netmask: "255.255.0.0"
    prefix_length: "16"
  http:
    use_x_forwarded_for: true
    trusted_proxy: "10.0.0.2/16"  # Your proxy server's network
    base_url: https://your.hostname.domain.com

homeassistant_kvm:
  vm_name: homeassistant
  path: /home/vm
  memory_mb: 4096
  vcpus: 2
  disk_size: 32
  data_path: /var/lib/homeassistant
  iso_path: /var/lib/libvirt/images
  bridge_interface: br0
  ip: 10.0.0.5