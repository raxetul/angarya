# Sample secrets file. Copy to my-secrets.yml, fill in real values, then encrypt:
#
#   ansible-vault encrypt my-secrets.yml
#
# Run the playbook supplying both the plaintext vars file and the vault file:
#
#   ansible-playbook site.yml \
#     --extra-vars "@my-variables.yml" \
#     --extra-vars "@my-secrets.yml" \
#     --ask-vault-pass
#
# (or use --vault-password-file <path> for unattended runs).

# Passwords for backup.db.targets keys in server/vars/main.yml.
# The dict keys here MUST match the keys under backup.db.targets exactly.
backup_db_secrets:
  example_main: "REPLACE-ME"
  example_analytics: "REPLACE-ME"
